name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repo. No job here writes contents,
# comments, or tokens.
permissions:
  contents: read

jobs:
  ts:
    name: TypeScript packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      # Build deps-first (sdk before mcp), THEN test — never test before build.
      - run: pnpm -r build
      # Type-check src + test together (tsconfig.test.json); tests are otherwise
      # only transpiled by vitest, never type-checked.
      - run: pnpm -r typecheck
      - run: pnpm -r test
      # Prove every PR is release-ready without publishing anything.
      # Use `pnpm pack` (the same tool `changeset publish` uses) rather than
      # `npm pack`: npm leaves `workspace:*` unresolved in the tarball, which
      # would publish broken. pnpm rewrites it to the real version — so we pack
      # for real and assert no `workspace:` specifier survives.
      - name: Pack (pnpm) — tarball contents + workspace:* fully resolved
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          ( cd sdk/typescript && pnpm pack --pack-destination "$TMP" )
          ( cd clients/mcp && pnpm pack --pack-destination "$TMP" )
          for tgz in "$TMP"/*.tgz; do
            echo "== $(basename "$tgz") =="
            tar -tzf "$tgz" | sed 's/^/  /'
            tar -xzO -f "$tgz" package/package.json \
              | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const p=JSON.parse(d);for(const [k,v] of Object.entries(p.dependencies||{})){if(String(v).startsWith("workspace:")){console.error("  UNRESOLVED workspace dep in published "+p.name+": "+k+"="+v);process.exit(1);}}console.log("  -> "+p.name+"@"+p.version+": no unresolved workspace deps");});'
          done
      - name: Dual-bundle smoke — CJS require + ESM import from packed sdk tarball
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          ( cd sdk/typescript && pnpm pack --pack-destination "$TMP" )
          TARBALL="$(ls "$TMP"/budgetary-sdk-*.tgz)"
          cd "$TMP"
          node -e "require('fs').writeFileSync('package.json', JSON.stringify({name:'sdk-smoke',private:true,version:'1.0.0'}))"
          npm install "$TARBALL" >/dev/null
          echo "CJS require():"
          node -e "const m=require('@budgetary/sdk'); if(typeof m.BudgetaryClient!=='function'||typeof m.BudgetaryError!=='function'){throw new Error('CJS require did not resolve the public API');} console.log('  OK ->', require.resolve('@budgetary/sdk'));"
          echo "ESM import:"
          node --input-type=module -e "import {BudgetaryClient, BudgetaryError} from '@budgetary/sdk'; if(typeof BudgetaryClient!=='function'||typeof BudgetaryError!=='function'){throw new Error('ESM import did not resolve the public API');} console.log('  OK');"
      - name: Types are dual-publish-correct (@arethetypeswrong/cli)
        run: |
          set -euo pipefail
          # A CJS TypeScript consumer on node16/nodenext must resolve real CJS
          # type declarations — not the ESM .d.ts, which fails as TS1479. attw
          # asserts every resolution mode (node10, node16 from CJS + from ESM,
          # bundler) so the exports map can't silently regress the dual types.
          TMP="$(mktemp -d)"
          ( cd sdk/typescript && pnpm pack --pack-destination "$TMP" )
          npx -y @arethetypeswrong/cli@0.18.4 "$TMP"/budgetary-sdk-*.tgz
          # @budgetary/mcp is ESM-only (type:module, exports only import+types),
          # so its `.d.ts` are checked with the esm-only profile (which ignores
          # the node10 / node16-from-CJS rows that are inherent to ESM-only and
          # were red on the prior tsc build too). This guards the bundled build's
          # exports/types from silently regressing.
          ( cd clients/mcp && pnpm pack --pack-destination "$TMP" )
          npx -y @arethetypeswrong/cli@0.18.4 "$TMP"/budgetary-mcp-*.tgz --profile esm-only
      - name: VS Code extension manifest sanity (unscoped name + publisher + engine)
        run: |
          node -e "const p=require('./clients/vscode/package.json'); if(!/^[a-z0-9][a-z0-9-]*\$/.test(p.name)){console.error('vscode name must be unscoped for vsce/ovsx:',p.name);process.exit(1);} if(!p.publisher){console.error('vscode publisher missing');process.exit(1);} if(!p.engines||!p.engines.vscode){console.error('vscode engines.vscode missing');process.exit(1);} console.log('vscode manifest OK:',p.publisher+'.'+p.name,p.engines.vscode);"
      - name: server.json version matches @budgetary/mcp package.json
        # The MCP registry publishes clients/mcp/server.json; both its version
        # fields must equal the package that ships. Fail the build on any drift
        # (e.g. a package.json bump that forgot server.json), rather than
        # discovering it at registry-publish time.
        run: |
          node -e '
            const pkg = require("./clients/mcp/package.json");
            const srv = require("./clients/mcp/server.json");
            const want = pkg.version;
            const top = srv.version;
            const pkgVer = srv.packages && srv.packages[0] && srv.packages[0].version;
            if (top !== want || pkgVer !== want) {
              console.error(
                "server.json version drift vs clients/mcp/package.json (" + want + "): " +
                  "top-level=" + top + " packages[0]=" + pkgVer,
              );
              process.exit(1);
            }
            console.log("server.json version matches package.json: " + want);
          '
      - name: Distributed npx pin matches @budgetary/mcp package.json
        # The hook + .mcp.json manifests pin `@budgetary/mcp@<version>` so a run
        # never resolves `latest`. Fail on any drift from clients/mcp/package.json
        # (kept in lockstep by `pnpm run version-packages`).
        run: node scripts/sync-mcp-pin.mjs --check

  py:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test the ends of the supported range (pyproject: 3.10–3.13).
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test deps
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        working-directory: sdk/python
        run: pytest
      - name: Type-check (mypy --strict)
        # The SDK ships py.typed, so its own hints must actually check. Config
        # lives in pyproject.toml ([tool.mypy]: strict, files = ["src"]).
        working-directory: sdk/python
        run: mypy
