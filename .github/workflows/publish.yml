name: publish

# Python SDK publishing only.
#
# The TypeScript/JS packages (@budgetary/sdk, @budgetary/mcp) and the VS Code
# extension (budgetary-vscode) are published by the changesets-driven
# .github/workflows/release.yml (publish-on-merge). Claude Code / Codex
# plugin-marketplace listings are tracked separately (0014b). This workflow is
# the Python (PyPI) path, which changesets does not manage: bump the version in
# sdk/python/pyproject.toml, then push a `sdk-py-vX.Y.Z` tag to publish.
on:
  push:
    tags:
      - "sdk-py-v*"

jobs:
  sdk-py:
    name: Publish budgetary to PyPI
    if: startsWith(github.ref, 'refs/tags/sdk-py-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (trusted publishing)
        # OIDC via the id-token permission above — no API token/secret. Requires
        # a Trusted Publisher for this repo+workflow configured on PyPI.
        # SHA-pinned (was the moving `release/v1` branch): this action holds the
        # OIDC-minted publish rights, so it must not float.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: sdk/python/dist/
